<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY | Central Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <div class="container">
            <div class="logo-area">
                <span class="logo-icon">🚀</span>
                <h1>Laboratorio<span>Digital</span></h1>
            </div>
            <p class="tagline">Ignacio Escapa</p>
            
            <!-- Category Boxes -->
            <div class="category-boxes">
                <div class="cat-box" data-cat="CLASES">
                    <span class="cat-icon">📚</span>
                    <span>CLASES</span>
                </div>
                <div class="cat-box" data-cat="MEF">
                    <span class="cat-icon">🏛️</span>
                    <span>MEF</span>
                </div>
                <div class="cat-box" data-cat="PROYECTO GONDWANA">
                    <span class="cat-icon">🌍</span>
                    <span>PROYECTO GONDWANA</span>
                </div>
                <div class="cat-box" data-cat="CONICET">
                    <span class="cat-icon">🔬</span>
                    <span>CONICET</span>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="projectSearch" placeholder="o busca un proyecto específico...">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="project-grid" id="projectGrid">
            <!-- Project cards injected dynamically by app.js -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ANTIGRAVITY HUB | Powering Science & Technology | Última act: <span id="last-sync-date">...</span></p>
        </div>
    </footer>

    <script src="projects.js"></script>
    <script src="app.js"></script>
</body>
</html>
