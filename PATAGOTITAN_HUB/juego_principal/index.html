<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corre Patagotitan, corre — La Flecha</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020202;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .back-link {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: #d97706;
            text-decoration: none;
            text-transform: uppercase;
        }

        .back-link:hover {
            color: #fff;
        }

        .game-title {
            font-size: 0.6rem;
            letter-spacing: 6px;
            color: #475569;
            text-transform: uppercase;
        }

        #game-container {
            width: 100%;
            max-width: 900px;
            position: relative;
            overflow: hidden;
            margin: 0;
            image-rendering: pixelated;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .ui-overlay {
            position: absolute;
            top: 15px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            visibility: hidden;
        }

        .lives-container {
            display: flex;
            gap: 8px;
        }

        .roar-bar-container {
            width: 120px;
            height: 10px;
            background: #222;
            border: 2px solid #fff;
            position: relative;
            margin-top: 5px;
        }

        #roar-fill {
            width: 0%;
            height: 100%;
            background: #ffffff;
            box-shadow: 0 0 8px #ffffff;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        #introScreen {
            background: #050505;
        }

        #messageScreen {
            background: #000;
            display: none;
        }

        #gameOver {
            background: rgba(0, 0, 0, 0.98);
            display: none;
            padding: 20px;
        }

        .btn-action {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            box-shadow: 4px 4px 0px #444;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .btn-action:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #222;
        }

        .message-text {
            font-size: 20px;
            padding: 0 60px;
            line-height: 1.6;
            max-width: 800px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #eee;
        }

        #countdown-display {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            display: none;
        }

        .trivia-container {
            margin: 10px 0;
            padding: 10px;
            border: none;
            background: transparent;
            max-width: 650px;
            color: #fff;
            text-align: center;
        }

        .trivia-title {
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
        }

        #trivia-text {
            font-size: 16px;
            line-height: 1.5;
            color: #fff;
        }

        .pixel-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 16px;
            color: #fff;
            transition: transform 0.1s;
        }

        .pixel-btn:hover {
            transform: scale(1.05);
        }

        .pixel-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <a href="../la_flecha_web/index.html" class="back-link">← Volver al Archivo</a>
        <span class="game-title">Corre Patagotitan, corre</span>
        <span style="font-size: 0.55rem; color: #333; letter-spacing: 2px;">VER. 2.0</span>
    </div>

    <div id="game-container">
        <div class="ui-overlay" id="uiOverlay">
            <div class="power-container">
                <div class="lives-container" id="lives"></div>
                <div class="roar-bar-container">
                    <div id="roar-fill"></div>
                </div>
                <div style="font-size: 9px; margin-top: 2px; text-transform: uppercase;" id="power-text">Tormenta de
                    Flores [ESPACIO]</div>
            </div>
            <div id="score">DISTANCIA: 0m</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="screen" id="introScreen">
            <h1 style="font-size: 38px; margin-bottom: 10px; letter-spacing: 2px;">CORRE PATAGOTITAN, CORRE</h1>
            <p style="color: #555; font-size: 12px; letter-spacing: 3px;">↑ SALTAR | ↓ BAJAR CUELLO | ESPACIO: PODER |
                P: PAUSA</p>
            <button class="btn-action" onclick="showStory()">COMENZAR</button>
        </div>
        <div class="screen" id="messageScreen">
            <div id="typewriter-text" class="message-text"></div>
            <div id="countdown-display"></div>
        </div>
        <div class="screen" id="pauseOverlay" style="display: none; background: rgba(0,0,0,0.6); z-index: 90;">
            <h2 style="font-size: 48px; margin: 0; color: #fff; letter-spacing: 5px;">PAUSA</h2>
        </div>
        <div class="screen" id="gameOver">
            <div
                style="display: flex; align-items: baseline; justify-content: center; gap: 20px; margin-bottom: 5px; width: 100%;">
                <h2 style="font-size: 32px; margin: 0; color: #ff4444;">¡EXTINCIÓN!</h2>
                <p id="finalScore" style="color: #aaa; margin: 0; font-size: 20px;"></p>
            </div>
            <div class="trivia-container">
                <span class="trivia-title">UN DATO CHIQUITO SOBRE UN DINO GIGANTE...</span>
                <span id="trivia-text"></span>
            </div>
            <div
                style="display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 40px; align-items: center; margin-top: 5px;">
                <div class="pixel-btn" onclick="reiniciarJuego()">
                    <svg width="32" height="32" viewBox="0 0 10 10" fill="white">
                        <rect x="6" y="1" width="3" height="2" />
                        <rect x="5" y="2" width="1" height="3" />
                        <rect x="1" y="4" width="5" height="3" />
                        <rect x="2" y="7" width="1" height="2" />
                        <rect x="4" y="7" width="1" height="2" />
                    </svg>
                    <span>Jugar de nuevo</span>
                </div>
                <div class="pixel-btn" onclick="mostrarOtroDatoNono()">
                    <svg width="32" height="32" viewBox="0 0 10 10" fill="white">
                        <rect x="4" y="1" width="2" height="1" />
                        <rect x="3" y="2" width="4" height="3" />
                        <rect x="4" y="5" width="2" height="2" />
                        <rect x="4" y="8" width="2" height="1" />
                    </svg>
                    <span>Dame otro dato ñoño</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');
        const puntajeDOM = document.getElementById('score');
        const vidasDOM = document.getElementById('lives');
        const barraPoderRelleno = document.getElementById('roar-fill');
        const pantallaGameOver = document.getElementById('gameOver');
        const pantallaIntro = document.getElementById('introScreen');
        const pantallaMensaje = document.getElementById('messageScreen');
        const textoMaquinaEscribir = document.getElementById('typewriter-text');
        const displayCuentaRegresiva = document.getElementById('countdown-display');
        const textoPuntajeFinal = document.getElementById('finalScore');
        const textoTrivia = document.getElementById('trivia-text');
        const overlayPausa = document.getElementById('pauseOverlay');

        canvas.width = 1000;
        canvas.height = 350;

        const Lista_DatosNono = [
            "Para proteger los huesos de Patagotitan en la excavación, se usaron más de 150 km de papel higiénico. ¡Una momia muy suave!",
            "Junto a Patagotitan crecía Patagoflora minima, una flor de menos de 1 cm de diámetro. ¡El gigante la habría pisado sin darse cuenta!",
            "Se hallaron 60 dientes de carnívoros cerca suyo. Su colosal cuerpo fue un gran banquete para los Tyrannotitan de la zona.",
            "Su fémur medía 2,4 metros, superando en altura a cualquier jugador profesional de básquet. ¡Inalcanzable!",
            "Con unas 57 toneladas, Patagotitan pesaba lo mismo que 10 elefantes africanos juntos. ¡Un verdadero terremoto con patas!",
            "En la Estancia La Flecha no estaba solo: se encontraron restos de al menos seis individuos que viajaban juntos.",
            "Sus inmensas vértebras estaban llenas de cavidades de aire, como las aves modernas. Sin esto, su peso lo habría aplastado.",
            "A su alrededor crecían Austrocupressinoxylon, antiguos cipreses capaces de clonarse para sobrevivir a erupciones volcánicas.",
            "Hace 101,6 millones de años, su hogar era una cálida llanura tropical de inundación, muy distinta a la estepa patagónica actual.",
            "Con 37 metros de largo, si estacionaras a Patagotitan en la calle, ¡ocuparía casi media cuadra entera de tu barrio!"
        ];

        let juegoActivo = false, puntajeDistancia = 0, velocidadJuegoInicial = 3.5, velocidadJuegoActual = 3.5;
        let contadorFotogramas = 0, desplazamientoSuelo = 0, tamanoPixel = 4, ultimoMetroAcelerado = -1;
        let cantidadVidas = 3, framesInmunidad = 0, energiaPoderEspecial = 0;
        let framesTormentaFlores = 0, juegoPausado = false;
        const teclasPresionadas = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false };

        let contextoAudio = null, tiempoSiguienteNota = 0, indiceNota = 0;
        const melodiaPrincipal = [164.81, 164.81, 196.00, 220.00, 164.81, 164.81, 246.94, 220.00, 164.81, 164.81, 196.00, 220.00, 246.94, 293.66, 329.63, 246.94];

        function reproducirSonido_Basico(frecuencia, duracion, tipo = 'square', volumen = 0.05) {
            if (!contextoAudio) return;
            try {
                const oscilador = contextoAudio.createOscillator();
                const ganancia = contextoAudio.createGain();
                oscilador.type = tipo;
                oscilador.frequency.setValueAtTime(frecuencia, contextoAudio.currentTime);
                ganancia.gain.setValueAtTime(volumen, contextoAudio.currentTime);
                ganancia.gain.exponentialRampToValueAtTime(0.001, contextoAudio.currentTime + duracion);
                oscilador.connect(ganancia); ganancia.connect(contextoAudio.destination);
                oscilador.start(); oscilador.stop(contextoAudio.currentTime + duracion);
            } catch (e) { }
        }

        function reproducirSonido_Salto() { reproducirSonido_Basico(160, 0.25, 'triangle', 0.15); }
        function reproducirSonido_Agacharse() { reproducirSonido_Basico(200, 0.2, 'sawtooth', 0.08); }
        function reproducirSonido_PoderFlores() { reproducirSonido_Basico(440, 0.4, 'sine', 0.1); reproducirSonido_Basico(880, 0.3, 'sine', 0.05); }
        function reproducirSonido_Golpe() { reproducirSonido_Basico(60, 0.4, 'sawtooth', 0.25); }
        function reproducirSonido_MaquinaEscribir() { reproducirSonido_Basico(1100 + Math.random() * 500, 0.02, 'sine', 0.01); }
        function reproducirSonido_Volcan() {
            if (!contextoAudio) return;
            const ahora = contextoAudio.currentTime;
            const osc = contextoAudio.createOscillator(); const ganancia = contextoAudio.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(35, ahora); osc.frequency.exponentialRampToValueAtTime(10, ahora + 1.2);
            ganancia.gain.setValueAtTime(0.4, ahora); ganancia.gain.linearRampToValueAtTime(0, ahora + 1.2);
            osc.connect(ganancia); ganancia.connect(contextoAudio.destination); osc.start(); osc.stop(ahora + 1.2);
        }

        function actualizarMusicaFondo() {
            if (!juegoActivo || !contextoAudio) return;
            const tempo = 1.8 / Math.max(1, velocidadJuegoActual);
            if (contextoAudio.currentTime > tiempoSiguienteNota) {
                const freq = melodiaPrincipal[indiceNota % melodiaPrincipal.length];
                reproducirSonido_Basico(freq, tempo * 0.6, 'square', 0.02);
                if (indiceNota % 2 === 0) reproducirSonido_Basico(freq / 2, tempo * 1.2, 'triangle', 0.04);
                tiempoSiguienteNota = contextoAudio.currentTime + tempo;
                indiceNota++;
            }
        }

        function actualizarUIVidas() {
            vidasDOM.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const tieneVida = i < cantidadVidas;
                vidasDOM.innerHTML += `<svg width="24" height="24" viewBox="0 0 10 10" style="opacity: ${tieneVida ? 1 : 0.15}">
                    <rect x="1" y="4" width="8" height="3" fill="#ff4444"/>
                    <rect x="2" y="7" width="6" height="1" fill="#ff4444"/>
                    <rect x="3" y="8" width="4" height="1" fill="#ff4444"/>
                </svg>`;
            }
        }

        const Paletas_Color = [
            { fg: '#ffffff', accent: '#555555', world: '#222222', layer2: '#111111' },
            { fg: '#ffdd44', accent: '#886622', world: '#332200', layer2: '#1a1100' },
            { fg: '#44ffaa', accent: '#118855', world: '#003311', layer2: '#001a08' },
            { fg: '#ff66aa', accent: '#882255', world: '#330011', layer2: '#1a0008' },
            { fg: '#66ccff', accent: '#225588', world: '#002244', layer2: '#001122' }
        ];
        let indiceTemaActual = 0;

        let volcanEnErupcion = false, particulas_Erupcion = [], particulas_Tierra = [], particulas_Flor = [];
        let temblorPantalla = { x: 0, y: 0 };

        function dibujarCuadroPixel(x, y, w, h, color = null, alpha = 1) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = color || Paletas_Color[indiceTemaActual].fg;
            ctx.fillRect(Math.round(x + temblorPantalla.x), Math.round(y + temblorPantalla.y), Math.round(w), Math.round(h));
            ctx.globalAlpha = 1;
        }

        const MatrizNubes_Tipos = [[[0, 0, 40, 8], [10, -8, 20, 8]], [[0, 0, 60, 8], [8, -8, 44, 8], [20, -16, 20, 8]]];
        const Fondo_Nubes = Array.from({ length: 6 }, () => ({ x: Math.random() * canvas.width, y: 20 + Math.random() * 80, tipo: Math.floor(Math.random() * MatrizNubes_Tipos.length), velocidad: 0.1 + Math.random() * 0.15 }));
        const Fondo_Araucarias = Array.from({ length: 5 }, () => ({ x: Math.random() * canvas.width, altura: 130 + Math.random() * 50, velocidad: 0.4 + Math.random() * 0.2 }));
        const Fondo_Helechos = Array.from({ length: 8 }, () => ({ x: Math.random() * canvas.width, tamano: 22 + Math.random() * 15, velocidad: 2.2 + Math.random() * 0.6 }));

        const Protagonista_Patagotitan = {
            x: 100, y: 200, sueloY: 200, velocidadY: 0, gravedad: 0.38, conteoSaltos: 0,
            estaSaltando: false, estaAgachado: false, nivelAgachadoLerp: 0,
            fuerzaSalto: -11.5, temporizadorImpactoSuelo: 0, sueloActualY: 200, velocidadMovimiento: 3.5,
            dibujar() {
                if (framesInmunidad > 0 && Math.floor(contadorFotogramas / 4) % 2 === 0) return;
                const bx = this.x; const by = this.y + (this.temporizadorImpactoSuelo > 0 ? 4 : 0);
                const cicloCaminar = (velocidadJuegoActual > 1) ? (contadorFotogramas * 0.12) % 4 : 0;
                const reboteCuerpo = this.estaSaltando ? 0 : (cicloCaminar < 2 ? 0 : tamanoPixel);
                const elevacionCola = this.nivelAgachadoLerp * 18;
                dibujarCuadroPixel(bx - 55, by + 20 - reboteCuerpo - elevacionCola * 0.5, 48, 20);
                dibujarCuadroPixel(bx - 95, by + 26 - reboteCuerpo - elevacionCola * 1.0, 40, 14);
                dibujarCuadroPixel(bx - 130, by + 32 - reboteCuerpo - elevacionCola * 1.5, 35, 8);
                let piernas = [0, 0, 0, 0];
                if (this.estaSaltando) piernas = [8, 8, 8, 8];
                else if (this.temporizadorImpactoSuelo > 0) piernas = [0, 0, 0, 0];
                else {
                    const fase = Math.floor(cicloCaminar);
                    if (fase === 0) piernas = [0, 6, 0, 4]; if (fase === 1) piernas = [6, 0, 4, 0];
                    if (fase === 2) piernas = [0, 6, 0, 4]; if (fase === 3) piernas = [6, 0, 4, 0];
                }
                dibujarCuadroPixel(bx + 10, by + 45 + piernas[0], 12, 28); dibujarCuadroPixel(bx + 30, by + 45 + piernas[1], 12, 28);
                dibujarCuadroPixel(bx + 65, by + 45 + piernas[2], 12, 28); dibujarCuadroPixel(bx + 85, by + 45 + piernas[3], 12, 28);
                dibujarCuadroPixel(bx - 15, by + 10 - reboteCuerpo, 125, 40); dibujarCuadroPixel(bx + 10, by - reboteCuerpo, 80, 10);
                dibujarCuadroPixel(bx + 20, by + 15 - reboteCuerpo, 10, 15, Paletas_Color[indiceTemaActual].accent);
                dibujarCuadroPixel(bx + 50, by + 12 - reboteCuerpo, 12, 20, Paletas_Color[indiceTemaActual].accent);
                const anchoCuello = 20 + (this.nivelAgachadoLerp * 45);
                const altoCuello = 45 * (1 - this.nivelAgachadoLerp) + 14 * this.nivelAgachadoLerp;
                dibujarCuadroPixel(bx + 80, by - reboteCuerpo - 5, 25, 25);
                dibujarCuadroPixel(bx + 85 + (this.nivelAgachadoLerp * 15), (by - 30 - reboteCuerpo) * (1 - this.nivelAgachadoLerp) + (by + 15 - reboteCuerpo) * this.nivelAgachadoLerp, anchoCuello, altoCuello);
                if (this.nivelAgachadoLerp > 0.5) {
                    dibujarCuadroPixel(bx + 170, by + 12 - reboteCuerpo, 26, 18);
                    dibujarCuadroPixel(bx + 175, by + 30 - reboteCuerpo, 14, 4);
                } else {
                    const cabezaY = by - 90 - reboteCuerpo;
                    dibujarCuadroPixel(bx + 90, cabezaY, 34, 18);
                    dibujarCuadroPixel(bx + 108, cabezaY + 18, 14, 4);
                    dibujarCuadroPixel(bx + 92, cabezaY + 18, 14, 45);
                }
            },
            actualizar() {
                if (this.temporizadorImpactoSuelo > 0) this.temporizadorImpactoSuelo--;
                if (framesInmunidad > 0) framesInmunidad--;
                if (framesTormentaFlores > 0) framesTormentaFlores--;
                if (energiaPoderEspecial < 100) energiaPoderEspecial += 0.1;
                barraPoderRelleno.style.width = energiaPoderEspecial + "%";
                this.nivelAgachadoLerp = this.estaAgachado ? Math.min(1, this.nivelAgachadoLerp + 0.1) : Math.max(0, this.nivelAgachadoLerp - 0.1);
                if (juegoActivo) {
                    if (teclasPresionadas.ArrowLeft) this.x -= this.velocidadMovimiento;
                    if (teclasPresionadas.ArrowRight) this.x += this.velocidadMovimiento;
                    this.x = Math.max(50, Math.min(this.x, canvas.width / 2));
                }
                this.velocidadY += this.gravedad; this.y += this.velocidadY;
                if (this.y >= this.sueloActualY) {
                    if (this.estaSaltando) {
                        this.temporizadorImpactoSuelo = 8;
                        for (let i = 0; i < 6; i++) crearParticula_Tierra(this.x + 50, this.sueloActualY + 80, Paletas_Color[indiceTemaActual].fg, (Math.random() - 0.5) * 12, -Math.random() * 6);
                    }
                    this.y = this.sueloActualY; this.velocidadY = 0; this.estaSaltando = false; this.conteoSaltos = 0;
                }
                this.sueloActualY = this.sueloY;
            }
        };

        const Array_ObstaculosEnPantalla = [];
        function crearParticula_Tierra(x, y, color, vx, vy) { particulas_Tierra.push({ x, y, vx, vy, color, life: 25 }); }
        function crearParticula_Flor() {
            particulas_Flor.push({
                x: Protagonista_Patagotitan.x + 80,
                y: Protagonista_Patagotitan.y + 20 - Math.random() * 200,
                vx: 14 + Math.random() * 6, vy: (Math.random() - 0.5) * 6, life: 70
            });
        }

        class Obstaculo_Plataforma {
            constructor() { this.x = canvas.width + 100; this.w = 180 + Math.random() * 100; this.h = 24; this.y = Protagonista_Patagotitan.sueloY + 60; this.type = 'platform'; this.tienePlanta = Math.random() > 0.5; }
            dibujar() {
                const tema = Paletas_Color[indiceTemaActual];
                dibujarCuadroPixel(this.x, this.y, this.w, this.h, tema.world);
                dibujarCuadroPixel(this.x + 4, this.y, this.w - 8, 4, tema.fg);
                if (this.tienePlanta) {
                    const tx = this.x + this.w / 2 - 20, ty = this.y - 44;
                    dibujarCuadroPixel(tx + 18, ty + 20, 4, 24); dibujarCuadroPixel(tx + 4, ty + 15, 12, 4);
                    dibujarCuadroPixel(tx + 24, ty + 15, 12, 4); dibujarCuadroPixel(tx + 10, ty + 5, 20, 4);
                    dibujarCuadroPixel(tx + 14, ty - 5, 12, 4);
                }
            }
            actualizar() { this.x -= velocidadJuegoActual; }
        }

        class Obstaculo_Meteorito {
            constructor() { this.w = 40; this.h = 40; this.x = canvas.width + 100; this.y = Protagonista_Patagotitan.sueloY - 85; this.speedX = -(velocidadJuegoActual + 4); this.trail = []; this.type = 'meteor'; }
            dibujar() {
                const tema = Paletas_Color[indiceTemaActual];
                this.trail.forEach((t, i) => dibujarCuadroPixel(t.x + 12, t.y + 12, 16, 16, tema.accent, (i / this.trail.length) * 0.4));
                dibujarCuadroPixel(this.x + 8, this.y, 24, 40); dibujarCuadroPixel(this.x, this.y + 8, 40, 24);
                dibujarCuadroPixel(this.x + 4, this.y + 4, 32, 32); dibujarCuadroPixel(this.x + 12, this.y + 12, 16, 16, tema.world);
            }
            actualizar() { this.x -= velocidadJuegoActual + 1.5; this.trail.push({ x: this.x, y: this.y }); if (this.trail.length > 15) this.trail.shift(); }
        }

        class Obstaculo_Planta {
            constructor() { this.x = canvas.width + 100; this.variante = Math.random() > 0.6 ? 'alta' : 'baja'; this.w = 40; this.h = this.variante === 'alta' ? 64 : 44; this.y = Protagonista_Patagotitan.sueloY + 84 - this.h; this.type = 'plant'; }
            dibujar() {
                const tx = this.x, ty = this.y, th = this.h;
                dibujarCuadroPixel(tx + 18, ty + 20, 4, th - 20); dibujarCuadroPixel(tx + 4, ty + 15, 12, 4);
                dibujarCuadroPixel(tx + 24, ty + 15, 12, 4); dibujarCuadroPixel(tx + 10, ty + 5, 20, 4);
                dibujarCuadroPixel(tx + 14, ty - 5, 12, 4);
                if (this.variante === 'alta') dibujarCuadroPixel(tx + 18, ty - 15, 4, 10);
            }
            actualizar() { this.x -= velocidadJuegoActual; }
        }

        function registrarGolpeJugador() {
            if (framesInmunidad > 0) return;
            cantidadVidas--; actualizarUIVidas(); reproducirSonido_Golpe();
            if (cantidadVidas <= 0) {
                juegoActivo = false; pantallaGameOver.style.display = 'flex';
                textoPuntajeFinal.innerText = `LLEGASTE A LOS ${Math.floor(puntajeDistancia / 10)} METROS`;
                mostrarOtroDatoNono();
            } else { framesInmunidad = 90; temblorPantalla = { x: 10, y: 10 }; }
        }

        function dibujar_EscenarioCompleto() {
            const tema = Paletas_Color[indiceTemaActual];
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            Fondo_Nubes.forEach(nube => {
                nube.x -= nube.velocidad; if (nube.x < -100) nube.x = canvas.width + 100;
                MatrizNubes_Tipos[nube.tipo].forEach(p => dibujarCuadroPixel(nube.x + p[0], nube.y + p[1], p[2], p[3], tema.fg, 0.15));
            });
            Fondo_Araucarias.forEach(arbol => {
                arbol.x -= arbol.velocidad * (velocidadJuegoActual / 7); if (arbol.x < -100) arbol.x = canvas.width + 100;
                const ax = arbol.x, ay = Protagonista_Patagotitan.sueloY + 84;
                dibujarCuadroPixel(ax, ay - arbol.altura, 14, arbol.altura, tema.layer2);
                for (let i = 0; i < 6; i++) { const bw = 60 - i * 10, rY = ay - arbol.altura + (i * 24); dibujarCuadroPixel(ax - bw / 2 + 7, rY, bw, 6, tema.layer2); }
            });
            const volcanX = canvas.width - 280, volcanY = Protagonista_Patagotitan.sueloY + 84;
            for (let i = 0; i < 9; i++) dibujarCuadroPixel(volcanX - (340 - i * 38) / 2 + 140, volcanY - (i + 1) * 22, (340 - i * 38), 22, tema.accent);
            if (volcanEnErupcion) {
                if (contadorFotogramas % 2 === 0) particulas_Erupcion.push({ x: volcanX + 140, y: volcanY - 190, vx: (Math.random() - 0.5) * 15, vy: -Math.random() * 20, life: 30 });
                temblorPantalla = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
            } else temblorPantalla = { x: 0, y: 0 };
            for (let i = particulas_Erupcion.length - 1; i >= 0; i--) { const p = particulas_Erupcion[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.life--; dibujarCuadroPixel(p.x, p.y, 8, 8, tema.fg); if (p.life <= 0) particulas_Erupcion.splice(i, 1); }
            for (let i = particulas_Tierra.length - 1; i >= 0; i--) { const p = particulas_Tierra[i]; p.x += p.vx; p.y += p.vy; p.life--; dibujarCuadroPixel(p.x, p.y, 4, 4, p.color, p.life / 25); if (p.life <= 0) particulas_Tierra.splice(i, 1); }
            Fondo_Helechos.forEach(helecho => {
                helecho.x -= helecho.velocidad * (velocidadJuegoActual / 4); if (helecho.x < -50) helecho.x = canvas.width + 50;
                dibujarCuadroPixel(helecho.x, Protagonista_Patagotitan.sueloY + 84 - helecho.tamano, helecho.tamano, helecho.tamano / 3, tema.world, 0.4);
            });
            desplazamientoSuelo = (desplazamientoSuelo + velocidadJuegoActual) % 40;
            for (let i = 0; i < canvas.width + 80; i += 40) dibujarCuadroPixel(i - desplazamientoSuelo, Protagonista_Patagotitan.sueloY + 84, 15, 4, tema.world);
        }

        function showStory() {
            if (!contextoAudio) contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
            if (contextoAudio.state === 'suspended') contextoAudio.resume();
            pantallaIntro.style.display = 'none'; pantallaMensaje.style.display = 'flex';
            const parte1 = "hace 100 millones de años, en la Estancia La Flecha (Patagonia, Argentina)...";
            const parte2 = "Patagotitan mayorum intenta sobrevivir";
            let indiceCaracter = 0; textoMaquinaEscribir.innerHTML = ""; textoMaquinaEscribir.style.opacity = "1"; let estadoMensaje = 1;
            function escribirCaracter() {
                if (estadoMensaje === 1) {
                    if (indiceCaracter < parte1.length) { textoMaquinaEscribir.innerHTML += parte1[indiceCaracter]; if (parte1[indiceCaracter] !== " ") reproducirSonido_MaquinaEscribir(); indiceCaracter++; setTimeout(escribirCaracter, 45); }
                    else { estadoMensaje = 2; indiceCaracter = 0; setTimeout(escribirCaracter, 1000); }
                } else if (estadoMensaje === 2) {
                    if (indiceCaracter === 0) textoMaquinaEscribir.innerHTML += "<br><br>";
                    if (indiceCaracter < parte2.length) { textoMaquinaEscribir.innerHTML += parte2[indiceCaracter]; if (parte2[indiceCaracter] !== " ") reproducirSonido_MaquinaEscribir(); indiceCaracter++; setTimeout(escribirCaracter, 45); }
                    else { setTimeout(() => { textoMaquinaEscribir.style.transition = "opacity 1s"; textoMaquinaEscribir.style.opacity = "0"; setTimeout(iniciarCuentaRegresiva, 1000); }, 1500); }
                }
            }
            escribirCaracter();
        }

        function iniciarCuentaRegresiva() {
            textoMaquinaEscribir.style.display = "none"; displayCuentaRegresiva.style.display = "block";
            let conteo = 3; displayCuentaRegresiva.innerHTML = `A CORRER EN ${conteo}...`;
            const intervalo = setInterval(() => {
                conteo--;
                if (conteo > 0) { displayCuentaRegresiva.innerHTML = `A CORRER EN ${conteo}...`; reproducirSonido_Basico(440, 0.1, 'sine', 0.05); }
                else { clearInterval(intervalo); displayCuentaRegresiva.innerHTML = "¡YA!"; reproducirSonido_Basico(880, 0.2, 'sine', 0.05); setTimeout(iniciarBucleJuego, 500); }
            }, 1000);
        }

        function iniciarBucleJuego() { pantallaMensaje.style.display = 'none'; uiOverlay.style.visibility = "visible"; actualizarUIVidas(); juegoActivo = true; tiempoSiguienteNota = contextoAudio.currentTime; CicloPrincipal_Juego(); }

        let timeoutTrivia = null, escribiendoTrivia = false;
        function mostrarOtroDatoNono() {
            if (escribiendoTrivia) return; escribiendoTrivia = true; clearTimeout(timeoutTrivia);
            const textoRandom = Lista_DatosNono[Math.floor(Math.random() * Lista_DatosNono.length)];
            textoTrivia.textContent = ""; let i = 0;
            function escribirChar() {
                if (i < textoRandom.length) { textoTrivia.textContent += textoRandom[i]; if (textoRandom[i] !== " " && i % 3 === 0) reproducirSonido_Basico(900 + Math.random() * 200, 0.02, 'sine', 0.01); i++; timeoutTrivia = setTimeout(escribirChar, 25); }
                else { escribiendoTrivia = false; }
            }
            escribirChar();
        }

        function CicloPrincipal_Juego() {
            if (!juegoActivo) return;
            if (juegoPausado) { requestAnimationFrame(CicloPrincipal_Juego); return; }
            contadorFotogramas++; puntajeDistancia++;
            const metrosActuales = Math.floor(puntajeDistancia / 10);
            puntajeDOM.innerText = `DISTANCIA: ${metrosActuales}m`;
            actualizarMusicaFondo();
            const cicloErupcion = puntajeDistancia % 1000;
            if ((cicloErupcion >= 960 || (cicloErupcion >= 0 && cicloErupcion <= 40))) { if (!volcanEnErupcion) reproducirSonido_Volcan(); volcanEnErupcion = true; } else volcanEnErupcion = false;
            if (metrosActuales > 0 && metrosActuales % 100 === 0 && metrosActuales !== ultimoMetroAcelerado) { ultimoMetroAcelerado = metrosActuales; indiceTemaActual = Math.floor(Math.random() * Paletas_Color.length); velocidadJuegoActual += 0.3; }
            dibujar_EscenarioCompleto(); Protagonista_Patagotitan.actualizar(); Protagonista_Patagotitan.dibujar();
            if (framesTormentaFlores > 0) { if (contadorFotogramas % 2 === 0) crearParticula_Flor(); }
            for (let i = particulas_Flor.length - 1; i >= 0; i--) {
                const f = particulas_Flor[i]; f.x += f.vx; f.y += f.vy; f.life--;
                const colorFlor = "#ffccff";
                dibujarCuadroPixel(f.x, f.y, 4, 4, colorFlor); dibujarCuadroPixel(f.x, f.y - 6, 4, 4, colorFlor); dibujarCuadroPixel(f.x - 6, f.y - 2, 4, 4, colorFlor);
                dibujarCuadroPixel(f.x + 6, f.y - 2, 4, 4, colorFlor); dibujarCuadroPixel(f.x - 4, f.y + 6, 4, 4, colorFlor); dibujarCuadroPixel(f.x + 4, f.y + 6, 4, 4, colorFlor);
                for (let j = Array_ObstaculosEnPantalla.length - 1; j >= 0; j--) {
                    const obj = Array_ObstaculosEnPantalla[j]; const ox = obj.x, oy = obj.y || 200;
                    if (Math.abs(ox - f.x) < 50 && Math.abs(oy - f.y) < 80) { crearParticula_Tierra(ox, oy, colorFlor, 0, -5); Array_ObstaculosEnPantalla.splice(j, 1); }
                }
                if (f.life <= 0 || f.x > canvas.width) particulas_Flor.splice(i, 1);
            }
            const ratioAparicion = Math.max(35, 80 - (velocidadJuegoActual * 2.5));
            const ultimoObstaculo = Array_ObstaculosEnPantalla[Array_ObstaculosEnPantalla.length - 1];
            if ((!ultimoObstaculo || (canvas.width - ultimoObstaculo.x > 320)) && contadorFotogramas % Math.floor(ratioAparicion) === 0 && Math.random() > 0.4) {
                const azar = Math.random();
                if (azar < 0.2) Array_ObstaculosEnPantalla.push(new Obstaculo_Plataforma());
                else if (azar < 0.7) Array_ObstaculosEnPantalla.push(new Obstaculo_Planta());
                else Array_ObstaculosEnPantalla.push(new Obstaculo_Meteorito());
            }
            for (let i = Array_ObstaculosEnPantalla.length - 1; i >= 0; i--) {
                const obstaculoActual = Array_ObstaculosEnPantalla[i]; obstaculoActual.actualizar(); obstaculoActual.dibujar();
                if (obstaculoActual.type === 'platform' && Protagonista_Patagotitan.x + 60 > obstaculoActual.x && Protagonista_Patagotitan.x < obstaculoActual.x + obstaculoActual.w && Protagonista_Patagotitan.velocidadY >= 0 && Protagonista_Patagotitan.y + 45 <= obstaculoActual.y + 10) {
                    Protagonista_Patagotitan.sueloActualY = obstaculoActual.y - 70;
                }
                const cajaJugador = { x: Protagonista_Patagotitan.x - 5, y: Protagonista_Patagotitan.y + 15, w: 105, h: 45 };
                const cajaCuello = Protagonista_Patagotitan.nivelAgachadoLerp > 0.5 ? { x: Protagonista_Patagotitan.x + 100, y: Protagonista_Patagotitan.y + 15, w: 90, h: 20 } : { x: Protagonista_Patagotitan.x + 85, y: Protagonista_Patagotitan.y - 90, w: 35, h: 100 };
                let cajaObstaculo = (obstaculoActual.type === 'platform') ? (obstaculoActual.tienePlanta ? { x: obstaculoActual.x + obstaculoActual.w / 2 - 20, y: obstaculoActual.y - 44, w: 40, h: 44 } : null) : { x: obstaculoActual.x + 8, y: obstaculoActual.y + 8, w: obstaculoActual.w - 16, h: obstaculoActual.h - 16 };
                const chequearColision = (r1, r2) => (r1 && r2 && r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y);
                if (framesInmunidad <= 0 && (chequearColision(cajaJugador, cajaObstaculo) || chequearColision(cajaCuello, cajaObstaculo))) {
                    registrarGolpeJugador(); if (cantidadVidas > 0) Array_ObstaculosEnPantalla.splice(i, 1);
                }
                if (obstaculoActual.x < -300) Array_ObstaculosEnPantalla.splice(i, 1);
            }
            requestAnimationFrame(CicloPrincipal_Juego);
        }

        function reiniciarJuego() {
            puntajeDistancia = 0; velocidadJuegoActual = velocidadJuegoInicial;
            Array_ObstaculosEnPantalla.length = 0; particulas_Erupcion = []; particulas_Tierra = []; particulas_Flor = [];
            juegoActivo = true; cantidadVidas = 3; desplazamientoSuelo = 0;
            framesInmunidad = 0; energiaPoderEspecial = 0; juegoPausado = false;
            barraPoderRelleno.style.background = "#ffffff"; barraPoderRelleno.style.boxShadow = "0 0 8px #ffffff";
            overlayPausa.style.display = 'none';
            Protagonista_Patagotitan.y = Protagonista_Patagotitan.sueloY; Protagonista_Patagotitan.x = 100;
            Protagonista_Patagotitan.estaSaltando = false; Protagonista_Patagotitan.estaAgachado = false;
            Protagonista_Patagotitan.conteoSaltos = 0; Protagonista_Patagotitan.temporizadorImpactoSuelo = 0;
            Protagonista_Patagotitan.nivelAgachadoLerp = 0;
            indiceTemaActual = 0; volcanEnErupcion = false; ultimoMetroAcelerado = -1;
            actualizarUIVidas(); pantallaGameOver.style.display = 'none';
            CicloPrincipal_Juego();
        }

        window.addEventListener('keydown', (e) => {
            if (juegoActivo && e.code === 'KeyP') {
                juegoPausado = !juegoPausado; overlayPausa.style.display = juegoPausado ? 'flex' : 'none';
                if (!juegoPausado && contextoAudio && contextoAudio.state === 'suspended') { contextoAudio.resume(); tiempoSiguienteNota = contextoAudio.currentTime; }
                else if (juegoPausado && contextoAudio && contextoAudio.state === 'running') { contextoAudio.suspend(); }
            }
            if (!juegoActivo || juegoPausado) return;
            if (teclasPresionadas.hasOwnProperty(e.code)) teclasPresionadas[e.code] = true;
            if (e.code === 'ArrowUp') {
                if (Protagonista_Patagotitan.conteoSaltos < 2) {
                    Protagonista_Patagotitan.estaSaltando = true; Protagonista_Patagotitan.velocidadY = Protagonista_Patagotitan.fuerzaSalto;
                    Protagonista_Patagotitan.conteoSaltos++; Protagonista_Patagotitan.temporizadorImpactoSuelo = 0;
                    Protagonista_Patagotitan.estaAgachado = false; reproducirSonido_Salto();
                }
            }
            if (e.code === 'ArrowDown') { Protagonista_Patagotitan.estaAgachado = true; reproducirSonido_Agacharse(); }
            if (e.code === 'Space') { if (energiaPoderEspecial >= 100) { energiaPoderEspecial = 0; framesTormentaFlores = 80; reproducirSonido_PoderFlores(); } }
        });

        window.addEventListener('keyup', (e) => {
            if (teclasPresionadas.hasOwnProperty(e.code)) teclasPresionadas[e.code] = false;
            if (e.code === 'ArrowDown') Protagonista_Patagotitan.estaAgachado = false;
        });

        dibujar_EscenarioCompleto(); Protagonista_Patagotitan.dibujar();
    </script>
